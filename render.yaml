services:
  - type: web
    name: physio-backend
    runtime: python
    buildCommand: cd UI1 && npm install --include=dev && npm run build && cd .. && pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --threads 4 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: FRONTEND_URL
        value: https://your-frontend-url.vercel.app   # ← update this after deploying frontend
    plan: free
